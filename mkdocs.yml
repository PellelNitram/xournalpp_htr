site_name: Xournal++ HTR
site_description: Developing handwritten text recognition for Xournal++

repo_name: PellelNitram/xournalpp_htr
repo_url: https://github.com/PellelNitram/xournalpp_htr
edit_uri: edit/master/docs/

strict: true

theme:
  name: material

plugins:
  - search # necessary for search to work
  - git-revision-date-localized:
      timezone: Europe/London
      locale: en
      fallback_to_build_date: false
      enable_creation_date: true

nav:
  - Introduction: 'index.md'
  - Getting Started as User:
    - Installation: 'installation_user.md'
    - User Guide: 'user_guide.md'
  - Getting Started as Developer:
    - Installation: 'installation_developer.md'
    - Developer Guide: 'developer_guide.md'
    - Architecture: 'architecture.md'
    - Demo Setup: 'demo_setup.md'
    - ADRs:
      - 001 Design of HuggingFace Space Dockerfile: 'ADRs/001_design_of_huggingface_space_dockerfile.md'
      - 002 Use HuggingFace ecosystem for ML: 'ADRs/002_use_HuggingFace_ecosystem_for_ML.md'
      - 003 Define target architecture: 'ADRs/003_define_target_architecture.md'
      - 004 Ground truth schema: 'ADRs/004_ground_truth_schema.md'
      - 005 Prediction bounding box coordinate system: 'ADRs/005_prediction_bounding_box_coordinate_system.md'
      - 006 Model registry and training environment: 'ADRs/006_model_registry_and_training_environment.md'
    - PoCs:
      - Simplify Installation with single file executable: 'PoCs/simplify_installation_with_single_file_executable.md'
  - Models:
    - Overview: 'models/index.md'
    - WordDetector: 'models/word_detector.md'
    - SimpleHTR: 'models/simple_htr.md'
  - Contributing: 'contributing.md'
  - Issue Labels: 'labels.md'
  - Roadmap: 'roadmap.md'
  - Funding: 'funding.md'

markdown_extensions:
  - pymdownx.superfences: # To enable mermaid.js charts, see https://squidfunk.github.io/mkdocs-material/reference/diagrams/.
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format